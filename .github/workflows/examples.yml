name: examples

on:
  push:
    paths:
      - "sylphy/**"
      - "examples/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/examples.yml"
  pull_request:
    paths:
      - "sylphy/**"
      - "examples/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/examples.yml"

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run examples
        run: bash examples/run_ci_examples.sh
